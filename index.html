        const BRAND_COLLECTIONS = [

        function hexToHSL(hex) {
            let r = parseInt(hex.slice(1, 3), 16) / 255;
            let g = parseInt(hex.slice(3, 5), 16) / 255;
            let b = parseInt(hex.slice(5, 7), 16) / 255;
            let max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h = 0, s = 0, l = (max + min) / 2;
            if (max !== min) {
                let d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                    default: break;
                }
                h /= 6;
            }
            return { h: h * 360, s, l };
        }

        const fetchWithRetry = async (url, options, retries = 5) => {
            let delay = 1000;
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }
        };

        function App() {
            const [wristSize, setWristSize] = useState(150); 
            const [beadSize, setBeadSize] = useState(8); 
            
            const totalBeadsNeeded = useMemo(() => {
                return Math.ceil(wristSize / beadSize); 
            }, [wristSize, beadSize]);

            const [bracelet, setBracelet] = useState(() => {
                const initial = Array(Math.ceil(150 / 8)).fill(null);
                const pattern = BRAND_COLLECTIONS[0].pattern;
                for(let i=0; i<initial.length; i++) {
                    const crystalId = pattern[i % pattern.length];
                    initial[i] = ALL_CRYSTALS.find(c => c.id === crystalId) || null;
                }
                return initial;
            }); 

            const [selectedSlots, setSelectedSlots] = useState([]); 

            // AI 相關狀態
            const [aiModalOpen, setAiModalOpen] = useState(false);
            const [aiMode, setAiMode] = useState(''); 
            const [aiInput, setAiInput] = useState('');
            const [aiResult, setAiResult] = useState(null);
            const [aiLoading, setAiLoading] = useState(false);
            const [aiError, setAiError] = useState('');

            const [searchTerm, setSearchTerm] = useState('');
            const [isDropdownOpen, setIsDropdownOpen] = useState(false);
            const [pendingCrystal, setPendingCrystal] = useState(null);
            const [pendingQty, setPendingQty] = useState(1);
            const searchInputRef = useRef(null);

            const currentBeadCount = bracelet.filter(c => c !== null).length;

            useEffect(() => {
                setBracelet(prev => {
                    const newB = [...prev];
                    if (newB.length < totalBeadsNeeded) {
                        newB.push(...Array(totalBeadsNeeded - newB.length).fill(null));
                    } else if (newB.length > totalBeadsNeeded) {
                        newB.length = totalBeadsNeeded;
                    }
                    return newB;
                });
                setSelectedSlots(prev => prev.filter(i => i < totalBeadsNeeded));
            }, [totalBeadsNeeded]);

            const filteredCrystals = useMemo(() => {
                if (!searchTerm) return ALL_CRYSTALS;
                return ALL_CRYSTALS.filter(c => 
                    c.name.includes(searchTerm) || c.id.includes(searchTerm)
                );
            }, [searchTerm]);

            const toggleSlotSelection = (index) => {
                setSelectedSlots(prev => 
                    prev.includes(index) ? prev.filter(slot => slot !== index) : [...prev, index]
                );
            };

            const handleSelectCrystal = (crystal) => {
                if (selectedSlots.length > 0) {
                    const newBracelet = [...bracelet];
                    selectedSlots.forEach(slotIndex => {
                        newBracelet[slotIndex] = crystal;
                    });
                    setBracelet(newBracelet);
                    setSelectedSlots([]); 
                    setSearchTerm('');
                    setIsDropdownOpen(false);
                    if(searchInputRef.current) searchInputRef.current.querySelector('input')?.blur();
                } else {
                    setPendingCrystal(crystal);
                    setPendingQty(1);
                }
            };

            const handleConfirmAdd = () => {
                if (!pendingCrystal) return;
                
                let newBracelet = [...bracelet];
                let addedCount = 0;
                
                for (let i = 0; i < totalBeadsNeeded && addedCount < pendingQty; i++) {
                    if (newBracelet[i] === null) {
                        newBracelet[i] = pendingCrystal;
                        addedCount++;
                    }
                }
                
                if (addedCount < pendingQty) {
                    const replaceCount = pendingQty - addedCount;
                    for (let i = 0; i < replaceCount; i++) {
                        const replaceIndex = totalBeadsNeeded - 1 - i;
                        if (replaceIndex >= 0) {
                            newBracelet[replaceIndex] = pendingCrystal;
                        }
                    }
                }

                setBracelet(newBracelet);
                setPendingCrystal(null);
                setSearchTerm('');
                setIsDropdownOpen(false);
                if(searchInputRef.current) searchInputRef.current.querySelector('input')?.blur();
            };

            const handleRemoveBead = (index) => {
                const newBracelet = [...bracelet];
                newBracelet[index] = null; 
                setBracelet(newBracelet);
            };

            const handleClear = () => {
                setBracelet(Array(totalBeadsNeeded).fill(null));
                setSelectedSlots([]);
            };

            const loadBrandCollection = (collection) => {
                const newBracelet = Array(totalBeadsNeeded).fill(null);
                for(let i=0; i<totalBeadsNeeded; i++) {
                    const crystalId = collection.pattern[i % collection.pattern.length];
                    newBracelet[i] = ALL_CRYSTALS.find(c => c.id === crystalId) || null;
                }
                setBracelet(newBracelet);
                setSelectedSlots([]);
            };

            const handleColorTheoryFill = () => {
                const crystalsWithHSL = ALL_CRYSTALS.map(c => ({ ...c, hsl: hexToHSL(c.color) }));
                const baseIndex = Math.floor(Math.random() * crystalsWithHSL.length);
                const baseCrystal = crystalsWithHSL[baseIndex];
                const baseHue = baseCrystal.hsl.h;

                const schemes = ['monochromatic', 'analogous', 'complementary', 'triadic'];
                const scheme = schemes[Math.floor(Math.random() * schemes.length)];

                let palette = [baseCrystal];

                const findClosest = (targetHue, excludeIds) => {
                    let bestMatch = null;
                    let minDiff = Infinity;
                    crystalsWithHSL.forEach(c => {
                        if (excludeIds.includes(c.id)) return;
                        let diff = Math.abs(c.hsl.h - targetHue);
                        if (diff > 180) diff = 360 - diff;
                        if (diff < minDiff) {
                            minDiff = diff;
                            bestMatch = c;
                        }
                    });
                    return bestMatch;
                };

                if (scheme === 'monochromatic') {
                    const match = findClosest(baseHue, [baseCrystal.id]);
                    if(match && Math.abs(match.hsl.h - baseHue) < 40) palette.push(match);
                } else if (scheme === 'analogous') {
                    const match1 = findClosest((baseHue + 40) % 360, [baseCrystal.id]);
                    const match2 = findClosest((baseHue - 40 + 360) % 360, [baseCrystal.id, match1?.id]);
                    if(match1) palette.push(match1);
                    if(match2) palette.push(match2);
                } else if (scheme === 'complementary') {
                    const match = findClosest((baseHue + 180) % 360, [baseCrystal.id]);
                    if(match) palette.push(match);
                } else if (scheme === 'triadic') {
                    const match1 = findClosest((baseHue + 120) % 360, [baseCrystal.id]);
                    const match2 = findClosest((baseHue + 240) % 360, [baseCrystal.id, match1?.id]);
                    if(match1) palette.push(match1);
                    if(match2) palette.push(match2);
                }

                const newBracelet = Array(totalBeadsNeeded).fill(null);
                for(let i=0; i < totalBeadsNeeded; i++) {
                    newBracelet[i] = palette[i % palette.length];
                }
                setBracelet(newBracelet);
                setSelectedSlots([]);
            };

            const openAIModal = (mode) => {
                setAiMode(mode);
                setAiModalOpen(true);
                setAiResult(null);
                setAiError('');
                setAiInput('');
                if (mode === 'reading') {

            };

            const handleAIWish = async () => {
                if (!aiInput.trim()) {

                }
                setAiLoading(true);

                    const payload = {
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    name: { type: "STRING", description: "手鍊名稱" },
                                    description: { type: "STRING", description: "設計理念與能量說明" },
                                    beadIds: { type: "ARRAY", items: { type: "STRING" }, description: "必須恰好包含 " + totalBeadsNeeded + " 個水晶ID" }
                                }
                            }
                        }
                    };

                    // 請注意：若您要將此 HTML 部署到公開網路，此處需填入有效的 Gemini API Key 才能執行 AI 功能
                    const apiKey = "AIzaSyAkxs9p0DuTEm3Gp6bM8IFswCG-LYyLyr8"; 
                    const data = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!text) throw new Error("無效的 API 回應");
                    const result = JSON.parse(text);

                    const newBracelet = Array(totalBeadsNeeded).fill(null);
                    if (result.beadIds && Array.isArray(result.beadIds)) {
                        for (let i = 0; i < totalBeadsNeeded; i++) {
                            const id = result.beadIds[i % result.beadIds.length];
                            const crystal = ALL_CRYSTALS.find(c => c.id === id);
                            if (crystal) newBracelet[i] = crystal;
                        }
                    }
                    
                    setBracelet(newBracelet);
                    setAiResult({ name: result.name, description: result.description });
                } catch (err) {
                    setAiError("生成失敗，請稍後再試：" + err.message);
                } finally {
                    setAiLoading(false);
                }
            };

                const currentCrystals = bracelet.filter(c => c !== null);

                    setAiError("手鍊上還沒有水晶喔！請先加入水晶再進行解析。");
                    setAiLoading(false);
                    return;

                setAiLoading(true);
                setAiError('');
                try {
                    const crystalNames = currentCrystals.map(c => c.name).join(", ");
                    const prompt = "你是一位充滿靈性與詩意的水晶療癒師。使用者搭配了一條包含以下水晶的手鍊：" + crystalNames + "。請為這條手鍊取一個充滿詩意的名字，並用 100 到 150 字左右描述它蘊含的綜合能量與祝福。";

                    const payload = {
                        contents: [{ parts: [{ text: prompt }] }]
                    };

                    // 請注意：若您要將此 HTML 部署到公開網路，此處需填入有效的 Gemini API Key 才能執行 AI 功能
                    const apiKey = "AIzaSyAkxs9p0DuTEm3Gp6bM8IFswCG-LYyLyr8";
                    const data = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!text) throw new Error("無效的 API 回應");

                    setAiResult({ description: text });
                } catch (err) {
                    setAiError("解讀失敗：" + err.message);
                } finally {
                    setAiLoading(false);
                }
            };

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (searchInputRef.current && !searchInputRef.current.contains(event.target)) {
                        setIsDropdownOpen(false);
                        setPendingCrystal(null);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const renderBracelet = () => {
                const N = totalBeadsNeeded;
                const canvasSize = 500;
                const center = canvasSize / 2;
                
                const radius_mm = (beadSize / 2) / Math.sin(Math.PI / N);
                const scale = (canvasSize * 0.4) / (radius_mm + beadSize/2); 
                const radius_px = radius_mm * scale;
                const beadRadius_px = (beadSize / 2) * scale;

                const beads = [];

                for (let i = 0; i < N; i++) {
                    const angle = (i * 2 * Math.PI) / N - (Math.PI / 2);
                    const x = center + radius_px * Math.cos(angle);
                    const y = center + radius_px * Math.sin(angle);
                    
                    const crystal = bracelet[i];

                    if (crystal) {
                        beads.push(
                            <div 
                                key={`bead-${i}`}
                                className={`bead-base texture-${crystal.type}`}
                                style={{
                                    width: `${beadRadius_px * 2}px`,
                                    height: `${beadRadius_px * 2}px`,
                                    left: `${x}px`,
                                    top: `${y}px`,
                                    backgroundColor: crystal.color
                                }}
                                onClick={() => handleRemoveBead(i)}
                                title={`點擊移除 ${crystal.name}`}
                            >
                                <div className="bead-highlight"></div>
                                {crystal.type === 'transparent' && <div className="bead-inner-glow"></div>}
                            </div>
                        );
                    } else {
                        const isSelected = selectedSlots.includes(i);
                        beads.push(
                            <div 
                                key={`empty-${i}`}
                                className={`bead-empty ${isSelected ? 'selected' : ''}`}
                                style={{
                                    width: `${beadRadius_px * 2}px`,
                                    height: `${beadRadius_px * 2}px`,
                                    left: `${x}px`,
                                    top: `${y}px`,
                                }}
                                onClick={() => toggleSlotSelection(i)}
                                title={isSelected ? "點擊取消選取" : "點擊選取此空位"}
                            >
                                {i+1}
                            </div>
                        );
                    }
                }
                return beads;
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-[#FAFAFA] font-sans">
                    <style dangerouslySetInnerHTML={{__html: `
                        .no-scrollbar::-webkit-scrollbar { display: none; }
                        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
                        
                        .bead-base {
                            border-radius: 50%;
                            position: absolute;
                            transform: translate(-50%, -50%);
                            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.5), inset 3px 3px 8px rgba(255,255,255,0.3), 3px 3px 8px rgba(0,0,0,0.3);
                            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                            cursor: pointer;
                        }
                        .bead-base:hover { transform: translate(-50%, -50%) scale(1.15); z-index: 10; box-shadow: inset -5px -5px 15px rgba(0,0,0,0.5), inset 3px 3px 8px rgba(255,255,255,0.3), 5px 5px 12px rgba(0,0,0,0.4); }
                        
                        .bead-highlight {
                            content: ''; position: absolute; top: 12%; left: 18%; width: 25%; height: 25%;
                            border-radius: 50%;
                            background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 70%);
                            z-index: 2; pointer-events: none;
                            transform: rotate(-45deg);
                        }
                        
                        .bead-inner-glow {
                            position: absolute; bottom: 8%; right: 8%; width: 50%; height: 50%;
                            border-radius: 50%;
                            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 60%);
                            z-index: 2; pointer-events: none;
                        }

                        .texture-transparent { background-image: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0.35) 100%); }
                        .texture-chatoyant { background-image: linear-gradient(60deg, rgba(255,255,255,0) 35%, rgba(255,255,255,0.5) 50%, rgba(255,255,255,0) 65%); }
                        .texture-cloudy { background-image: radial-gradient(circle at 40% 40%, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 40%, rgba(255,255,255,0.2) 80%); }
                        
                        .bead-empty {
                            border-radius: 50%; position: absolute; transform: translate(-50%, -50%);
                            border: 2px dashed #D1D5DB; display: flex; align-items: center; justify-content: center;
                            color: #9CA3AF; font-size: 0.8rem;
                            transition: all 0.2s ease;
                            cursor: pointer;
                        }
                        .bead-empty:hover { border-color: #b87333; color: #b87333; transform: translate(-50%, -50%) scale(1.05); }
                        
                        .bead-empty.selected {
                            border-color: #b87333;
                            background-color: #fdf8f5;
                            color: #b87333;
                            border-style: solid;
                            border-width: 2px;
                            box-shadow: 0 0 10px rgba(184,115,51,0.3);
                            transform: translate(-50%, -50%) scale(1.15);
                            z-index: 5;
                            font-weight: bold;
                        }

                        @keyframes float-up-anim {
                            0% { transform: translateY(20px); opacity: 0; }
                            100% { transform: translateY(0); opacity: 1; }
                        }
                        .animate-float-up { animation: float-up-anim 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
                        
                        @keyframes float-up-center-anim {
                            0% { transform: translate(-50%, 20px); opacity: 0; }
                            100% { transform: translate(-50%, 0); opacity: 1; }
                        }
                        .animate-float-up-center { animation: float-up-center-anim 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
                    `}} />

                    {/* 左側控制面板 */}
                    <div className="w-full md:w-1/3 bg-white shadow-xl p-8 flex flex-col z-20 overflow-y-auto max-h-screen">
                        <div className="mb-8 flex justify-between items-start">
                            <div>
                                <h1 className="text-3xl font-bold tracking-widest text-gray-800 mb-2">予己</h1>
                                <p className="text-sm text-gray-500">內部專用・高階晶石配珠模擬器</p>
                            </div>
                            {/* 品牌快捷載入 */}
                            <button 
                                onClick={() => loadBrandCollection(BRAND_COLLECTIONS[0])}
                                className="flex items-center gap-1.5 text-xs font-bold text-[#b87333] bg-[#fdf8f5] px-3 py-1.5 rounded-full hover:bg-[#faeedd] border border-[#f0e6df] transition-colors"
                                title="載入破局者預設排列"
                            >
                                🔖 {BRAND_COLLECTIONS[0].name}
                            </button>
                        </div>

                        <div className="mb-6 space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">設定手圍尺寸</label>
                                <div className="flex space-x-4">
                                    <label className="flex items-center space-x-2 cursor-pointer">
                                        <input type="radio" className="form-radio text-[#b87333] accent-[#b87333]" checked={wristSize === 150} onChange={() => setWristSize(150)} />
                                        <span className="text-gray-700">女段 (15cm)</span>
                                    </label>
                                    <label className="flex items-center space-x-2 cursor-pointer">
                                        <input type="radio" className="form-radio text-[#b87333] accent-[#b87333]" checked={wristSize === 170} onChange={() => setWristSize(170)} />
                                        <span className="text-gray-700">男段 (17cm)</span>
                                    </label>
                                </div>
                            </div>
                            
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">設定單珠尺寸</label>
                                <div className="flex space-x-3">
                                    {[6, 8, 10, 12].map(size => (
                                        <button 
                                            key={size}
                                            onClick={() => setBeadSize(size)}
                                            className={`px-3 py-1 rounded border transition-colors ${beadSize === size ? 'bg-[#b87333] text-white border-[#b87333]' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-50'}`}
                                        >
                                            {size}mm
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="border-t border-gray-200 my-4"></div>

                        {/* 搜尋下拉選單 */}
                        <div className="mb-6 relative" ref={searchInputRef}>
                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                {selectedSlots.length > 0 
                                    ? <span className="text-[#b87333] font-bold">為 {selectedSlots.length} 個指定位置選擇水晶：</span> 
                                    : `選擇水晶 (${ALL_CRYSTALS.length}款)`}
                            </label>
                            <div className="relative">
                                <input 
                                    type="text"
                                    className={`w-full border rounded-md py-3 pl-4 pr-10 focus:outline-none focus:ring-2 focus:ring-[#b87333] focus:border-transparent text-gray-700 transition-colors
                                        ${selectedSlots.length > 0 ? 'border-[#b87333] bg-[#fdf8f5]' : 'border-gray-300'}`}
                                    placeholder={selectedSlots.length > 0 ? "輸入關鍵字直接填入選定位置..." : "輸入關鍵字，例如：虎眼、粉晶..."}
                                    value={searchTerm}
                                    onChange={(e) => {
                                        setSearchTerm(e.target.value);
                                        setIsDropdownOpen(true);
                                        setPendingCrystal(null);
                                    }}
                                    onFocus={() => setIsDropdownOpen(true)}
                                />
                                <div className={`absolute right-3 top-3 ${selectedSlots.length > 0 ? 'text-[#b87333]' : 'text-gray-400'}`}>
                                    <Search size={20} />
                                </div>
                            </div>

                            {isDropdownOpen && (
                                pendingCrystal && selectedSlots.length === 0 ? (
                                    <div className="absolute z-50 w-full mt-1 bg-white border border-gray-200 rounded-md shadow-lg p-5">
                                        <div className="flex items-center space-x-4 mb-5 pb-4 border-b border-gray-100">
                                            <div 
                                                className="w-10 h-10 rounded-full shadow-inner border border-gray-200"
                                                style={{ backgroundColor: pendingCrystal.color }}
                                            ></div>
                                            <div>
                                                <div className="font-bold text-gray-800 text-lg">{pendingCrystal.name}</div>
                                                <div className="text-xs text-gray-400">{pendingCrystal.id}</div>
                                            </div>
                                        </div>
                                        
                                        <div className="mb-6">
                                            <label className="block text-sm text-gray-600 mb-2">選擇加入數量：</label>
                                            <div className="flex items-center border border-gray-300 rounded-md w-full max-w-[200px] overflow-hidden">
                                                <button 
                                                    className="px-4 py-2 bg-gray-50 text-gray-600 hover:bg-gray-100 transition-colors"
                                                    onClick={() => setPendingQty(Math.max(1, pendingQty - 1))}
                                                >
                                                    <Minus size={16} />
                                                </button>
                                                <input 
                                                    type="number" 
                                                    className="w-full text-center border-none focus:ring-0 py-2 font-medium" 
                                                    value={pendingQty} 
                                                    onChange={(e) => setPendingQty(Math.max(1, parseInt(e.target.value) || 1))}
                                                    min="1"
                                                />
                                                <button 
                                                    className="px-4 py-2 bg-gray-50 text-gray-600 hover:bg-gray-100 transition-colors"
                                                    onClick={() => setPendingQty(pendingQty + 1)}
                                                >
                                                    <Plus size={16} />
                                                </button>
                                            </div>
                                            <p className="text-xs text-gray-400 mt-2">目前手鍊剩餘 {Math.max(0, totalBeadsNeeded - currentBeadCount)} 個空位</p>
                                        </div>
                                        
                                        <div className="flex space-x-3">
                                            <button 
                                                className="flex-1 py-2.5 bg-gray-100 text-gray-600 rounded-md hover:bg-gray-200 transition-colors flex items-center justify-center gap-1 text-sm font-medium"
                                                onClick={() => setPendingCrystal(null)}
                                            >
                                                <ArrowLeft size={16} /> 返回列表
                                            </button>
                                            <button 
                                                className="flex-1 py-2.5 bg-[#b87333] text-white rounded-md hover:bg-[#a06020] transition-colors flex items-center justify-center gap-1 text-sm font-medium shadow-sm"
                                                onClick={handleConfirmAdd}
                                            >
                                                加入手鍊
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <ul className="absolute z-50 w-full mt-1 bg-white border border-gray-200 rounded-md shadow-lg max-h-64 overflow-y-auto no-scrollbar">
                                        {filteredCrystals.length > 0 ? (
                                            filteredCrystals.map(crystal => (
                                                <li 
                                                    key={crystal.id}
                                                    className={`px-4 py-3 cursor-pointer flex items-center space-x-3 border-b border-gray-50 last:border-0 transition-colors
                                                        ${selectedSlots.length > 0 ? 'hover:bg-[#fdf8f5]' : 'hover:bg-gray-50'}`}
                                                    onClick={() => handleSelectCrystal(crystal)}
                                                >
                                                    <div 
                                                        className="w-6 h-6 rounded-full shadow-inner border border-gray-200"
                                                        style={{ backgroundColor: crystal.color }}
                                                    ></div>
                                                    <span className="font-medium text-gray-800">{crystal.name}</span>
                                                    <span className={`text-xs ml-auto flex items-center gap-1 ${selectedSlots.length > 0 ? 'text-[#b87333]' : 'text-gray-400'}`}>
                                                        {selectedSlots.length > 0 ? `填入 ${selectedSlots.length} 個位置` : '加入'} <Plus size={12} />
                                                    </span>
                                                </li>
                                            ))
                                        ) : (
                                            <li className="px-4 py-4 text-gray-500 text-center">找不到相符的水晶</li>
                                        )}
                                    </ul>
                                )
                            )}
                        </div>

                        <div className="bg-gray-50 rounded-lg p-4 mb-6">
                            <div className="flex justify-between text-sm mb-2">
                                <span className="text-gray-600">目前進度</span>
                                <span className="font-bold text-[#b87333]">{currentBeadCount} / {totalBeadsNeeded} 顆</span>
                            </div>
                            <div className="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">
                                <div className="bg-[#b87333] h-2.5 rounded-full transition-all duration-300" style={{ width: `${(currentBeadCount / totalBeadsNeeded) * 100}%` }}></div>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-3 mt-auto pt-4 pb-4">
                            <button 
                                onClick={handleClear}
                                className="py-3 bg-gray-100 text-gray-600 font-medium rounded hover:bg-gray-200 transition flex items-center justify-center gap-2"
                            >
                                <Trash2 size={18} /> 清空
                            </button>
                            <button 
                                onClick={handleColorTheoryFill}
                                className="py-3 bg-[#b87333] text-white font-medium rounded hover:bg-[#a06020] transition shadow-md flex items-center justify-center gap-2"
                            >
                                <Sparkles size={18} /> 色彩
                            </button>
                            <button 
                                onClick={() => openAIModal('wish')}
                                className="col-span-1 py-3 bg-gradient-to-r from-purple-500 to-indigo-500 text-white font-medium rounded hover:opacity-90 transition shadow-md flex items-center justify-center gap-2"
                            >
                                ✨ 智能許願
                            </button>
                            <button 
                                onClick={() => openAIModal('reading')}
                                className="col-span-1 py-3 bg-gradient-to-r from-teal-400 to-emerald-500 text-white font-medium rounded hover:opacity-90 transition shadow-md flex items-center justify-center gap-2"
                            >
                                ✨ 能量解析
                            </button>
                        </div>
                    </div>

                    {/* 右側視覺模擬器 Canvas */}
                    <div className="w-full md:w-2/3 relative flex items-center justify-center bg-[#F9F9F7] overflow-hidden min-h-[500px]">
                        <div className="absolute w-[400px] h-[400px] border border-[#E5E5E0] rounded-full opacity-50 pointer-events-none"></div>
                        <div className="absolute w-[550px] h-[550px] border border-[#E5E5E0] rounded-full opacity-20 pointer-events-none"></div>
                        
                        <div className="relative w-[500px] h-[500px] scale-75 md:scale-100">
                            {renderBracelet()}
                        </div>

                        {selectedSlots.length > 0 ? (
                            <div className="absolute bottom-16 left-1/2 transform -translate-x-1/2 bg-white/95 backdrop-blur-sm px-4 py-3 rounded-full shadow-xl border-2 border-[#b87333] flex items-center gap-4 z-30 animate-float-up-center whitespace-nowrap">
                                <button 
                                    onClick={() => setSelectedSlots([])}
                                    className="bg-gray-100 p-1.5 rounded-full text-gray-400 hover:text-gray-600 hover:bg-gray-200 transition-colors"
                                    title="取消選擇"
                                >
                                    <X size={16} />
                                </button>
                                <span className="text-[#b87333] font-bold">已選擇 {selectedSlots.length} 個位置</span>
                                <button 
                                    className="bg-[#b87333] text-white px-5 py-2 rounded-full text-sm hover:bg-[#a06020] transition-colors flex items-center gap-1 shadow-md font-medium tracking-wide"
                                    onClick={() => {
                                        const input = searchInputRef.current?.querySelector('input');
                                        if(input) {
                                            input.focus();
                                            setIsDropdownOpen(true);
                                            window.scrollTo({ top: 0, behavior: 'smooth' }); 
                                        }
                                    }}
                                >
                                    <Plus size={16} /> 加入水晶
                                </button>
                            </div>
                        ) : (
                            <div className="absolute bottom-8 text-center text-gray-400 text-sm tracking-widest bg-white/60 px-5 py-2.5 rounded-full backdrop-blur-md shadow-sm">
                                {currentBeadCount === 0 ? '請從左側加入水晶，或點擊右側空位指定位置' : '點擊手鍊上的水晶可移除，點擊空位可指定位置'}
                            </div>
                        )}
                    </div>
                    
                    {/* AI Modal 覆蓋層 */}
                    {aiModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col animate-float-up">
                                <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                                    <h3 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                                        {aiMode === 'wish' ? '✨ AI 智能許願配鍊' : '✨ AI 手鍊能量解析'}
                                    </h3>
                                    <button onClick={() => setAiModalOpen(false)} className="text-gray-400 hover:text-gray-600 transition-colors">
                                        <X size={24} />
                                    </button>
                                </div>
                                
                                <div className="p-6">
                                    {aiMode === 'wish' && !aiResult && (
                                        <div className="space-y-4">
                                            <p className="text-sm text-gray-600 leading-relaxed">請告訴 Gemini 您希望這條手鍊為您帶來什麼樣的能量與幫助？</p>
                                            <textarea 
                                                className="w-full border border-gray-300 rounded-xl p-3 focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition-all resize-none"
                                                rows="3"
                                                placeholder="例如：最近工作壓力很大，想要招財、防小人，並且晚上能睡個好覺..."
                                                value={aiInput}
                                                onChange={(e) => setAiInput(e.target.value)}
                                                disabled={aiLoading}
                                            />
                                            {aiError && <p className="text-red-500 text-sm">{aiError}</p>}
                                            <button 
                                                onClick={handleAIWish}
                                                disabled={aiLoading}
                                                className="w-full py-3 bg-purple-600 text-white font-bold rounded-xl hover:bg-purple-700 transition-colors disabled:opacity-50 flex items-center justify-center gap-2"
                                            >
                                                {aiLoading ? <LoadingSpinner /> : <Sparkles size={18} />}
                                                {aiLoading ? 'AI 正在為您通靈配製中...' : '✨ 讓 AI 為您設計'}
                                            </button>
                                        </div>
                                    )}

                                    {aiMode === 'reading' && !aiResult && !aiError && (
                                        <div className="flex flex-col items-center justify-center py-8 text-indigo-600 space-y-4">
                                            <LoadingSpinner />
                                            <p className="font-medium animate-pulse">✨ AI 正在傾聽您的手鍊能量...</p>
                                        </div>
                                    )}

                                    {(aiMode === 'reading' && aiError) && (
                                        <div className="text-center space-y-4">
                                            <p className="text-red-500">{aiError}</p>
                                            <button onClick={() => setAiModalOpen(false)} className="px-6 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition">關閉</button>
                                        </div>
                                    )}

                                    {aiResult && (
                                        <div className="space-y-4 animate-float-up">
                                            {aiResult.name && (
                                                <h4 className="text-xl font-bold text-center text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-indigo-600">
                                                    《 {aiResult.name} 》
                                                </h4>
                                            )}
                                            <div className="bg-[#fdf8f5] p-5 rounded-xl text-gray-700 leading-relaxed text-sm shadow-inner whitespace-pre-wrap border border-[#f0e6df]">
                                                {aiResult.description}
                                            </div>
                                            {aiMode === 'wish' && (
                                                <p className="text-center text-emerald-600 text-sm font-bold flex items-center justify-center gap-1">
                                                    <Sparkles size={16}/> 已自動將設計套用至您的手鍊！
                                                </p>
                                            )}
                                            <button 
                                                onClick={() => setAiModalOpen(false)}
                                                className="w-full py-3 bg-gray-900 text-white font-bold rounded-xl hover:bg-gray-800 transition-colors"
                                            >
                                                完成
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // 渲染 React 應用
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
